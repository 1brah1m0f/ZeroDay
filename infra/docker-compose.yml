version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: comtech-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: comtech
      POSTGRES_PASSWORD: comtech_pass
      POSTGRES_DB: comtech_db
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U comtech']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: comtech-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redisdata:/data

  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    container_name: comtech-api
    restart: unless-stopped
    ports:
      - '4000:4000'
    env_file:
      - ../.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
    container_name: comtech-web
    restart: unless-stopped
    ports:
      - '3000:3000'
    env_file:
      - ../.env
    depends_on:
      - api

  nginx:
    image: nginx:alpine
    container_name: comtech-nginx
    restart: unless-stopped
    ports:
      - '80:80'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web
      - api

volumes:
  pgdata:
  redisdata:
